apply plugin: 'com.android.application'

android {
    namespace 'com.loteria.katana'
    compileSdk 34

    defaultConfig {
        applicationId "com.loteria.katana"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-ads:23.6.0'
}
